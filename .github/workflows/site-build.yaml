name: UI CI Build

on:
  pull_request:
    branches: [develop]
    paths: 'TheCookbookUI/**' # removing checks for non-api code changes

jobs:
  build:
    name: Node UI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TheCookbookUI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.0'

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build